<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Startup - Future Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            background: #0a0a0a;
            color: #fff;
        }

        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #39ff14;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s ease;
            mix-blend-mode: difference;
        }

        .cursor-follower {
            position: fixed;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(180, 0, 255, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
        }

        .section {
            min-height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Section 1 - Hero */
        #section1 {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 100%);
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 8s infinite ease-in-out;
        }

        .orb1 {
            width: 300px;
            height: 300px;
            background: #39ff14;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb2 {
            width: 400px;
            height: 400px;
            background: #b400ff;
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }

        .orb3 {
            width: 200px;
            height: 200px;
            background: #39ff14;
            top: 50%;
            left: 50%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(20px, 30px) scale(1.05); }
        }

        .glass-container {
            display: flex;
            gap: 30px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
        }

        .glass-box {
            width: 300px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .glass-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(57, 255, 20, 0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        .glass-box:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #39ff14;
            box-shadow: 0 15px 50px rgba(57, 255, 20, 0.3);
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* Section 2 - Technology */
        #section2 {
            background: linear-gradient(135deg, #1a0a1a 0%, #0a1a0a 100%);
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            z-index: 10;
            max-width: 1200px;
        }

        .tech-card {
            width: 300px;
            height: 400px;
            background: rgba(180, 0, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(180, 0, 255, 0.2);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tech-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(180, 0, 255, 0.2) 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .tech-card:hover {
            transform: translateY(-20px) rotateY(10deg);
            border-color: #b400ff;
            box-shadow: 0 20px 60px rgba(180, 0, 255, 0.4);
        }

        .tech-card:hover::before {
            opacity: 1;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border: 2px solid #b400ff;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { width: 150px; height: 150px; opacity: 1; }
            100% { width: 300px; height: 300px; opacity: 0; }
        }

        /* Section 3 - Innovation */
        #section3 {
            background: linear-gradient(135deg, #0a1a0a 0%, #0a0a1a 100%);
        }

        .innovation-container {
            display: flex;
            gap: 50px;
            z-index: 10;
            align-items: center;
        }

        .innovation-box {
            width: 400px;
            height: 500px;
            background: rgba(57, 255, 20, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(57, 255, 20, 0.3);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .innovation-box::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.2) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .innovation-box:hover {
            transform: scale(1.05) rotate(2deg);
            border-color: #39ff14;
            box-shadow: 0 25px 70px rgba(57, 255, 20, 0.5);
        }

        .liquid-shape {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, #39ff14, #b400ff);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: morph 8s infinite ease-in-out;
            filter: blur(10px);
        }

        @keyframes morph {
            0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            25% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
            50% { border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; }
            75% { border-radius: 30% 70% 70% 30% / 70% 30% 30% 70%; }
        }

        /* Section 4 - Contact */
        #section4 {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a1a 100%);
        }

        .contact-wrapper {
            display: flex;
            gap: 60px;
            z-index: 10;
        }

        .contact-panel {
            width: 350px;
            height: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .contact-panel::before {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: conic-gradient(from 0deg, transparent, #39ff14, transparent, #b400ff, transparent);
            animation: spin 4s linear infinite;
            opacity: 0.3;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .contact-panel:hover {
            transform: translateY(-15px) scale(1.03);
            border-color: #b400ff;
            box-shadow: 0 30px 80px rgba(180, 0, 255, 0.6);
        }

        .inner-panel {
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            background: rgba(10, 10, 10, 0.9);
            border-radius: 47px;
            backdrop-filter: blur(30px);
        }

        /* Scroll Progress Indicator */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, #39ff14, #b400ff);
            z-index: 10001;
            transition: width 0.1s ease;
        }

        /* Navigation Dots */
        .nav-dots {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #39ff14;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-dot.active {
            background: #39ff14;
            box-shadow: 0 0 20px #39ff14;
        }

        .nav-dot:nth-child(2) {
            border-color: #b400ff;
        }

        .nav-dot:nth-child(2).active {
            background: #b400ff;
            box-shadow: 0 0 20px #b400ff;
        }

        .nav-dot:nth-child(3) {
            border-color: #39ff14;
        }

        .nav-dot:nth-child(3).active {
            background: #39ff14;
            box-shadow: 0 0 20px #39ff14;
        }

        .nav-dot:nth-child(4) {
            border-color: #b400ff;
        }

        .nav-dot:nth-child(4).active {
            background: #b400ff;
            box-shadow: 0 0 20px #b400ff;
        }

        /* Particle System */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #39ff14;
            border-radius: 50%;
            animation: particleFloat 15s infinite linear;
            opacity: 0.6;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Wave Animation */
        .wave-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            overflow: hidden;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M0,60 C300,120 600,0 900,60 C1200,120 1200,120 1200,120 L1200,120 L0,120 Z" fill="rgba(57,255,20,0.1)"/></svg>');
            background-size: 50% 100%;
            animation: waveMove 10s infinite linear;
        }

        .wave2 {
            animation: waveMove 15s infinite linear reverse;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M0,60 C300,120 600,0 900,60 C1200,120 1200,120 1200,120 L1200,120 L0,120 Z" fill="rgba(180,0,255,0.1)"/></svg>');
            background-size: 50% 100%;
        }

        @keyframes waveMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Glitch Effect on Hover */
        .glitch-text {
            position: relative;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -1px 0 #39ff14;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -1px 0 #b400ff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(30px, 9999px, 10px, 0); }
            5% { clip: rect(80px, 9999px, 90px, 0); }
            10% { clip: rect(50px, 9999px, 20px, 0); }
            15% { clip: rect(10px, 9999px, 80px, 0); }
            20% { clip: rect(70px, 9999px, 30px, 0); }
            25% { clip: rect(20px, 9999px, 60px, 0); }
            30% { clip: rect(90px, 9999px, 10px, 0); }
            35% { clip: rect(40px, 9999px, 50px, 0); }
            40% { clip: rect(60px, 9999px, 20px, 0); }
            45% { clip: rect(10px, 9999px, 70px, 0); }
            50% { clip: rect(80px, 9999px, 40px, 0); }
            55% { clip: rect(30px, 9999px, 90px, 0); }
            60% { clip: rect(50px, 9999px, 10px, 0); }
            65% { clip: rect(70px, 9999px, 60px, 0); }
            70% { clip: rect(20px, 9999px, 30px, 0); }
            75% { clip: rect(90px, 9999px, 80px, 0); }
            80% { clip: rect(40px, 9999px, 20px, 0); }
            85% { clip: rect(60px, 9999px, 50px, 0); }
            90% { clip: rect(10px, 9999px, 70px, 0); }
            95% { clip: rect(80px, 9999px, 40px, 0); }
            100% { clip: rect(30px, 9999px, 90px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(10px, 9999px, 80px, 0); }
            5% { clip: rect(60px, 9999px, 20px, 0); }
            10% { clip: rect(90px, 9999px, 50px, 0); }
            15% { clip: rect(20px, 9999px, 70px, 0); }
            20% { clip: rect(50px, 9999px, 10px, 0); }
            25% { clip: rect(80px, 9999px, 40px, 0); }
            30% { clip: rect(30px, 9999px, 90px, 0); }
            35% { clip: rect(70px, 9999px, 60px, 0); }
            40% { clip: rect(10px, 9999px, 30px, 0); }
            45% { clip: rect(40px, 9999px, 80px, 0); }
            50% { clip: rect(90px, 9999px, 20px, 0); }
            55% { clip: rect(60px, 9999px, 50px, 0); }
            60% { clip: rect(20px, 9999px, 70px, 0); }
            65% { clip: rect(80px, 9999px, 10px, 0); }
            70% { clip: rect(50px, 9999px, 40px, 0); }
            75% { clip: rect(10px, 9999px, 90px, 0); }
            80% { clip: rect(70px, 9999px, 30px, 0); }
            85% { clip: rect(30px, 9999px, 60px, 0); }
            90% { clip: rect(90px, 9999px, 20px, 0); }
            95% { clip: rect(40px, 9999px, 80px, 0); }
            100% { clip: rect(60px, 9999px, 50px, 0); }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- Scroll Progress -->
    <div class="scroll-progress"></div>

    <!-- Navigation Dots -->
    <div class="nav-dots">
        <div class="nav-dot active" data-section="1"></div>
        <div class="nav-dot" data-section="2"></div>
        <div class="nav-dot" data-section="3"></div>
        <div class="nav-dot" data-section="4"></div>
    </div>

    <!-- Section 1: Hero -->
    <section id="section1" class="section">
        <div class="hero-bg">
            <div class="floating-orb orb1"></div>
            <div class="floating-orb orb2"></div>
            <div class="floating-orb orb3"></div>
            <div class="particles" id="particles1"></div>
        </div>
        <div class="glass-container">
            <div class="glass-box"></div>
            <div class="glass-box"></div>
            <div class="glass-box"></div>
        </div>
        <div class="wave-container">
            <div class="wave"></div>
            <div class="wave wave2"></div>
        </div>
    </section>

    <!-- Section 2: Technology -->
    <section id="section2" class="section">
        <div class="particles" id="particles2"></div>
        <div class="tech-grid">
            <div class="tech-card">
                <div class="pulse-ring"></div>
            </div>
            <div class="tech-card">
                <div class="pulse-ring"></div>
            </div>
            <div class="tech-card">
                <div class="pulse-ring"></div>
            </div>
        </div>
    </section>

    <!-- Section 3: Innovation -->
    <section id="section3" class="section">
        <div class="particles" id="particles3"></div>
        <div class="innovation-container">
            <div class="innovation-box">
                <div class="liquid-shape"></div>
            </div>
            <div class="innovation-box">
                <div class="liquid-shape"></div>
            </div>
        </div>
    </section>

    <!-- Section 4: Contact -->
    <section id="section4" class="section">
        <div class="particles" id="particles4"></div>
        <div class="contact-wrapper">
            <div class="contact-panel">
                <div class="inner-panel"></div>
            </div>
            <div class="contact-panel">
                <div class="inner-panel"></div>
            </div>
        </div>
    </section>

    <script>
        // Custom Cursor
        const cursor = document.querySelector('.cursor');
        const cursorFollower = document.querySelector('.cursor-follower');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            setTimeout(() => {
                cursorFollower.style.left = e.clientX + 'px';
                cursorFollower.style.top = e.clientY + 'px';
            }, 50);
        });

        // Cursor hover effects
        document.querySelectorAll('.glass-box, .tech-card, .innovation-box, .contact-panel').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(2)';
                cursor.style.borderColor = '#b400ff';
                cursorFollower.style.transform = 'scale(1.5)';
            });
            
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
                cursor.style.borderColor = '#39ff14';
                cursorFollower.style.transform = 'scale(1)';
            });
        });

        // Scroll Progress
        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset;
            const docHeight = document.body.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            document.querySelector('.scroll-progress').style.width = scrollPercent + '%';
            
            updateNavDots();
        });

        // Navigation Dots
        function updateNavDots() {
            const sections = document.querySelectorAll('.section');
            const scrollPos = window.scrollY + window.innerHeight / 2;
            
            sections.forEach((section, index) => {
                const sectionTop = section.offsetTop;
                const sectionHeight = section.offsetHeight;
                
                if (scrollPos >= sectionTop && scrollPos < sectionTop + sectionHeight) {
                    document.querySelectorAll('.nav-dot').forEach(dot => dot.classList.remove('active'));
                    document.querySelector(`.nav-dot[data-section="${index + 1}"]`).classList.add('active');
                }
            });
        }

        // Click on nav dots
        document.querySelectorAll('.nav-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                const sectionNum = dot.getAttribute('data-section');
                const section = document.getElementById(`section${sectionNum}`);
                section.scrollIntoView({ behavior: 'smooth' });
            });
        });

        // Create Particles
        function createParticles(containerId, count, color) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.background = color;
                container.appendChild(particle);
            }
        }

        createParticles('particles1', 30, '#39ff14');
        createParticles('particles2', 40, '#b400ff');
        createParticles('particles3', 35, '#39ff14');
        createParticles('particles4', 25, '#b400ff');

        // Intersection Observer for animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        // Observe all interactive elements
        document.querySelectorAll('.glass-box, .tech-card, .innovation-box, .contact-panel').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(50px)';
            el.style.transition = 'all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            observer.observe(el);
        });

        // Parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.floating-orb');
            const mouseX = e.clientX / window.innerWidth - 0.5;
            const mouseY = e.clientY / window.innerHeight - 0.5;
            
            orbs.forEach((orb, index) => {
                const speed = (index + 1) * 20;
                orb.style.transform = `translate(${mouseX * speed}px, ${mouseY * speed}px)`;
            });
        });

        // Smooth scroll between sections
        let currentSection = 0;
        const sections = document.querySelectorAll('.section');
        let isScrolling = false;

        window.addEventListener('wheel', (e) => {
            if (isScrolling) return;
            
            if (e.deltaY > 0 && currentSection < sections.length - 1) {
                isScrolling = true;
                currentSection++;
                sections[currentSection].scrollIntoView({ behavior: 'smooth' });
                setTimeout(() => { isScrolling = false; }, 1000);
            } else if (e.deltaY < 0 && currentSection > 0) {
                isScrolling = true;
                currentSection--;
                sections[currentSection].scrollIntoView({ behavior: 'smooth' });
                setTimeout(() => { isScrolling = false; }, 1000);
            }
        });

        // Add magnetic effect to glass boxes
        document.querySelectorAll('.glass-box, .tech-card, .innovation-box, .contact-panel').forEach(el => {
            el.addEventListener('mousemove', (e) => {
                const rect = el.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const deltaX = (x - centerX) / centerX;
                const deltaY = (y - centerY) / centerY;
                
                el.style.transform = `perspective(1000px) rotateY(${deltaX * 10}deg) rotateX(${-deltaY * 10}deg) translateY(-10px)`;
            });
            
            el.addEventListener('mouseleave', () => {
                el.style.transform = 'perspective(1000px) rotateY(0) rotateX(0) translateY(0)';
            });
        });
    </script>
</body>
</html>
